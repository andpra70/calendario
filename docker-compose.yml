services:
  calendario-dev:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "6065:6065"
    volumes:
      - .:/app
      - calendario_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 6065

volumes:
  calendario_node_modules:
